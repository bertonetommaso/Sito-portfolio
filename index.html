    <style>
        /* RESET BASE */
        body, html {
            margin: 0;
            padding: 0;
            background-color: #fcfcfc;
            overflow-x: hidden;
        }

        /* L'AREA DI SCROLL: crea lo spazio per poter scrollare, 
           ma non contiene nulla di visibile. */
        .scroll-area {
            height: 10000px; /* Più è lungo, più lentamente si disegna la linea */
        }

        /* IL VIEWPORT FISSO: La nostra "Telecamera" che non si muove mai */
        .fixed-viewport {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            pointer-events: none; /* Lascia passare i click allo sfondo */
            overflow: hidden;
        }

        /* LA SCENA DELLA TELECAMERA: Questo div verrà mosso da JavaScript
           per tenere la punta della linea sempre a fuoco. */
        .camera {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            will-change: transform;
        }

        /* IL GRUPPO (Solo per il blob e il pezzettino iniziale) */
        .gooey-group {
            position: relative;
            filter: url('#goo'); 
            z-index: 2; /* Sta sopra la linea animata per nascondere la giuntura */
        }

        /* IL BLOB (Centrato assoluto) */
        .blob {
            position: absolute;
            width: 150px;  
            height: 150px;
            background: #f05a28;
            
            top: 150px;
            left: 50%;
            margin-top: -75px; 
            margin-left: -75px; 
            
            animation: morph 8s ease-in-out infinite, spin 20s linear infinite;
        }

        /* LE TELE SVG (Larghissime per toccare i bordi dello schermo) */
        .line-svg {
            position: absolute;
            top: 0;
            left: 50%;
            margin-left: -1000px; 
            width: 2000px;
            height: 8000px; /* Tela allungata a 6000px per ospitare tutti i gradini */
        }

        /* La traccia animata è isolata dal filtro! */
        .animated-line-container {
            z-index: 1;
        }

        path {
            stroke: #f05a28;
            stroke-width: 30; 
            fill: none;
            stroke-linecap: butt; 
            stroke-linejoin: miter; 
        }

        /* Keyframes espansi: molti più punti di ancoraggio per un movimento liquido complesso */
        @keyframes morph {
            0%   { border-radius: 40% 60% 70% 30% / 40% 50% 60% 50%; }
            20%  { border-radius: 60% 40% 30% 70% / 60% 30% 70% 40%; }
            40%  { border-radius: 30% 70% 60% 40% / 50% 60% 30% 60%; }
            60%  { border-radius: 70% 30% 40% 60% / 30% 70% 50% 40%; }
            80%  { border-radius: 50% 50% 70% 30% / 70% 40% 60% 30%; }
            100% { border-radius: 40% 60% 70% 30% / 40% 50% 60% 50%; }
        }

        @keyframes spin {
            0% { transform: rotate(0deg) scale(1); }
            50% { transform: rotate(180deg) scale(1.05); } /* Leggero respiro */
            100% { transform: rotate(360deg) scale(1); }
        }

       

      
        /* Nascondiamo il filtro SVG usato solo per calcoli visivi */
        .hidden-filter {
            position: absolute;
            width: 0;
            height: 0;
        }
    </style>

    <script>
        // Inizializza Lenis per lo smooth scrolling
        const lenis = new Lenis({
            duration: 1.5, // Quanto è lento e scivoloso lo scroll (aumenta per più scivolamento)
            easing: (t) => Math.min(1, 1.001 - Math.pow(2, -10 * t)), // Curva di smorzamento
            direction: 'vertical',
            smooth: true
        });

        // Collega Lenis al motore di rendering del browser
        function raf(time) {
            lenis.raf(time);
            requestAnimationFrame(raf);
        }
        requestAnimationFrame(raf);

        gsap.registerPlugin(ScrollTrigger);

        const path = document.querySelector("#animatedLine");
        const camera = document.querySelector(".camera");
        const pathLength = path.getTotalLength();

        gsap.set(path, {
            strokeDasharray: pathLength,
            strokeDashoffset: pathLength
        });

        function updateCamera(progress) {
            const drawLength = progress * pathLength;
            
            gsap.to(path, { 
                strokeDashoffset: pathLength - drawLength, 
                ease: "power2.out", 
                duration: 0.1 
            });

            const point = path.getPointAtLength(drawLength);

            // MAGIA DEL CENTRAMENTO:
            // Da scroll zero al 5%, la telecamera scende fluidamente dal 50% dell'altezza schermo all'80%.
            // (Lock abbassato per permetterti di vedere il riquadro appena disegnato sopra la punta)
            const targetRatioY = progress < 0.05 ? 0.5 + (progress / 0.05) * 0.30 : 0.80;
            
            // Fissiamo la X al centro della nostra nuova tela larga 2000px
            const cameraX = (window.innerWidth * 0.5) - 1000; 
            const cameraY = (window.innerHeight * targetRatioY) - point.y;

            gsap.to(camera, { 
                x: cameraX, 
                y: cameraY, 
                ease: "power2.out", 
                duration: 0.5 
            });
        }
        gsap.registerPlugin(Draggable);

        const blob = document.querySelector('.blob');
        const card = document.querySelector('.about-card');
        const hint = document.querySelector('.blob-hint');
        const face = document.querySelector('.face-text');
        const viewport = document.querySelector('.fixed-viewport');
        const cameraDiv = document.querySelector('.camera');
        
        let isCardOut = false;
        let isFullscreen = false;

        // 1. CLIC SUL BLOB: "Sputa" la casella
        blob.addEventListener('click', () => {
            if (isCardOut) return;
            isCardOut = true;
            
            // Fai sparire la scritta "click here"
            gsap.to(hint, { opacity: 0, y: -20, duration: 0.3 });
            
            // Animazione "sputo" organico
            gsap.to(card, {
                opacity: 1,
                pointerEvents: 'auto',
                x: 250, // Lo spara a destra
                y: -100, // Lo spara in alto
                rotation: -8, // Lo inclina leggermente
                duration: 1.5,
                ease: "elastic.out(1, 0.4)" // Rimbalzo gommoso
            });
        });

        // 2. LOGICA DI TRASCINAMENTO E CLICK
        Draggable.create(card, {
            type: "x,y",
            onPress: function() {
                // Cambia faccia quando premi (se non è a tutto schermo)
                if (!isFullscreen) face.innerText = "me ;/";
            },
            onRelease: function() {
                // Torna sorridente quando rilasci
                if (!isFullscreen) face.innerText = "me :]";
            },
            onDrag: function() {
                if (isFullscreen) return; // Disabilita scia a tutto schermo
                
                // Crea l'effetto scia (Trail)
                const p = document.createElement('div');
                p.className = 'trail-particle';
                viewport.appendChild(p);
                
                // Centra la particella sul mouse
                gsap.set(p, { x: this.pointerX, y: this.pointerY });
                
                // Animazione di dissolvenza particella
                gsap.to(p, {
                    scale: 0,
                    opacity: 0,
                    y: "+=30", // Cade leggermente verso il basso
                    duration: 0.6,
                    onComplete: () => p.remove() // Pulisce il codice HTML
                });
            },
            onClick: function() {
                if (isFullscreen) return;
                isFullscreen = true;
                
                // Spostiamo la card nel viewport fisso per sfuggire al movimento dello scroll
                const rect = card.getBoundingClientRect();
                viewport.appendChild(card);
                
                // La blocchiamo al volo dov'era
                gsap.set(card, {
                    x: 0, y: 0,
                    left: rect.left,
                    top: rect.top,
                    margin: 0,
                    rotation: 0
                });
                
                // Sfochiamo tutto il sito dietro
                cameraDiv.classList.add('is-blurred');
                
                // Espandiamo a tutto schermo
                gsap.to(card, {
                    left: 0, top: 0,
                    width: '100vw', height: '100vh',
                    borderRadius: 0,
                    duration: 0.8,
                    ease: "power3.inOut",
                    onComplete: () => {
                        // Nascondi la faccina e mostra il contenuto
                        gsap.to(face, { opacity: 0, duration: 0.2 });
                        gsap.to('.about-content', { opacity: 1, pointerEvents: 'auto', duration: 0.5 });
                    }
                });
            }
        });
        updateCamera(0);

        ScrollTrigger.create({
            trigger: ".scroll-area",
            start: "top top",
            end: "bottom bottom",
            scrub: 1, // Fluidità aggiuntiva sincronizzata con Lenis
            onUpdate: (self) => {
                updateCamera(self.progress);
                
            }
            
        });
    
        window.addEventListener("resize", () => {
            const st = ScrollTrigger.getAll()[0];
            if(st) updateCamera(st.progress);
        });
    </script>

gsap.set(path, {
strokeDasharray: pathLength,
strokeDashoffset: pathLength
});

function updateCamera(progress) {
const drawLength = progress * pathLength;

gsap.to(path, { 
strokeDashoffset: pathLength - drawLength, 
ease: "power2.out", 
duration: 0.1 
});

const point = path.getPointAtLength(drawLength);

// MAGIA DEL CENTRAMENTO:
// Da scroll zero al 5%, la telecamera scende fluidamente dal 50% dell'altezza schermo all'80%.
// (Lock abbassato per permetterti di vedere il riquadro appena disegnato sopra la punta)
const targetRatioY = progress < 0.05 ? 0.5 + (progress / 0.05) * 0.30 : 0.80;

// Fissiamo la X al centro della nostra nuova tela larga 2000px
const cameraX = (window.innerWidth * 0.5) - 1000; 
const cameraY = (window.innerHeight * targetRatioY) - point.y;

gsap.to(camera, { 
x: cameraX, 
y: cameraY, 
ease: "power2.out", 
duration: 0.5 
});
}

updateCamera(0);

ScrollTrigger.create({
trigger: ".scroll-area",
start: "top top",
end: "bottom bottom",
scrub: 1, // Fluidità aggiuntiva sincronizzata con Lenis
onUpdate: (self) => {
updateCamera(self.progress);
}
});

window.addEventListener("resize", () => {
const st = ScrollTrigger.getAll()[0];
if(st) updateCamera(st.progress);
});
</script>
</body>
</html>
